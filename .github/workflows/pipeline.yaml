name: CI/CD Pipeline
# !!! NOT WORKING YET !!!
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Compile
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0 # Essential for MinVer to calculate Git-based versions

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v5

    - name: Build Mod (Release Configuration)
      run: dotnet build --Configuration release --property:VTOLVRPath="C:\DummyPath"

    - name: Upload Build Artifacts
      uses: actions/upload-artifact
      with:
        name: build-payload
        path: |
          bin/Release/RCF.dll
          bin/Release/RCF.pdb
          item.json
        retention-days: 1
  deploy:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
    - name: Download Built Payload
      uses: actions/download-artifact@v4
      with:
        name: build-payload
        path: publish/

    - name: Compress Release Package
      run: |
        Compress-Archive -Path publish\* -DestinationPath RCF-Mod.zip

    - name: Create GitHub Release and Upload Assets
      uses: softprops/action-gh-releasev3
      with:
        files: RCF-Mod.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}